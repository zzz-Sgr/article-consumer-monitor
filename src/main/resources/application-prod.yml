server:
  port: 10087

spring:
  datasource:
    # 脱敏：去掉真实的 IP、用户名和密码
    url: jdbc:mysql://127.0.0.1:3306/your_database_name?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8
    username: your_username
    password: your_password

monitor:
  server:
    ip: 127.0.0.1
    # 需求 6 要求的监控端口列表
    ports: 9092,9100,10087
  kafka:
    script-path: /path/to/your/kafka-check.sh
  alarm:
    email-to: example1@domain.com,example2@domain.com
    daily-limit:
      port: 5    # 新增：端口告警每天上限
      kafka: 3   # 新增：Kafka告警每天上限
  rules:
    data-stop-hours: 8 # 新增：断流几小时报警
    fail-level:
      l1: 20  # 新增：阶梯告警阈值
      l2: 50
      l3: 100
