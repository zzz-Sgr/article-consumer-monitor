spring:
  datasource:
    # 开发环境数据库
    url: jdbc:mysql://127.0.0.1:3306/your_database_name?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8
    username: your_username
    password: your_password

monitor:
  server:
    ip: 127.0.0.1
    # 开发环境测试端口
    ports: 3306,3306,3306
    # 脱敏：可以用一个通用的路径替代你们公司真实的路径
    script-path: /path/to/your/kafka-check.sh
  alarm:
    email-to: example1@domain.com,example2@domain.com

    daily-limit:
      port: 5
      kafka: 3
  rules:
    data-stop-hours: 8
    fail-level:
      l1: 20
      l2: 50
      l3: 100
